services:
  app:
    image: mcr.microsoft.com/devcontainers/ruby:3.3
    volumes:
      - ..:/workspaces/sheipe_api:cached
      - bundle:/usr/local/bundle
    working_dir: /workspaces/sheipe_api
    command: sleep infinity
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/sheipe_api_development
      TEST_DATABASE_URL: postgres://postgres:postgres@db:5432/sheipe_api_test
      RAILS_ENV: development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  bundle:
