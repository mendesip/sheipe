default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://localhost/sheipe_api_development") %>

test:
  <<: *default
  url: <%= ENV.fetch("TEST_DATABASE_URL", ENV.fetch("DATABASE_URL", "postgres://localhost/sheipe_api_test").gsub("_development", "_test")) %>

production:
  primary: &primary_production
    <<: *default
    database: sheipe_api_production
    username: sheipe_api
    password: <%= ENV["SHEIPE_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: sheipe_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: sheipe_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: sheipe_api_production_cable
    migrations_paths: db/cable_migrate
